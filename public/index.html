<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="情景英语">
<link rel="manifest" href="/manifest.json">
<title>情景英语学习 · 发音卡片</title>
<style>
  :root {
    --ink: #1d1d1f;
    --muted: #6a6a70;
    --ipa: #b5794a;
    --marked: #b23a47;
    --paper: #eef1f6;
    --card: #ffffff;
    --card-border: rgba(0,0,0,0.07);
    --line: rgba(0,0,0,0.1);
    --accent: #4d4d55;
    --ok: #2a9d4a;
    --err: #d93025;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  body { background: var(--paper); min-height: 100vh; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 40px 28px 96px; }
  header { border-bottom: 1px solid var(--line); padding-bottom: 16px; margin-bottom: 20px; }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .header-actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--line);
    background: transparent; color: var(--accent); cursor: pointer;
    font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 15px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .15s ease, color .15s ease;
  }
  .icon-btn:hover { background: #ff9a3c; color: #fff; border-color: #ff9a3c; }
  .kicker { font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--accent); font-family: "Gill Sans","Avenir Next",sans-serif; margin-bottom: 10px; }
  h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.01em; }
  .subtitle {
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    font-size: 14px; color: var(--muted); margin-top: 8px; line-height: 1.8;
  }
  .kw-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 6px;
    font-weight: 500; font-size: 12.5px;
    letter-spacing: .02em; margin: 0 2px;
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  }
  .kw-tag::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
  }
  .kw-tag.ctx  { background: rgba(0,122,255,.07);  color: #0066cc; }
  .kw-tag.ctx::before  { background: #007aff; }
  .kw-tag.out  { background: rgba(88,86,214,.08);  color: #5046d6; }
  .kw-tag.out::before  { background: #5856d6; }
  .kw-tag.ipa  { background: rgba(180,121,74,.10); color: #9a6534; font-size: 12.5px; font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; margin-top: 0; white-space: normal; }
  .kw-tag.ipa::before  { background: #b5794a; }
  .kw-tag.tts  { background: rgba(52,199,89,.08);  color: #248a3d; }
  .kw-tag.tts::before  { background: #34c759; }

  .legend { display: flex; gap: 20px; flex-wrap: wrap; margin: 0 0 14px; font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 12.5px; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; gap: 7px; }
  .swatch { width: 13px; height: 13px; border-radius: 3px; display: inline-block; }
  .sw-marked { background: var(--marked); }
  .sw-ipa { background: var(--ipa); }
  .sw-collo { background: var(--ink); }

  .overview { position: relative; background: transparent; border: none; border-radius: 0; padding: 0; margin-bottom: 30px; box-shadow: none; }
  .overview .sec-label { font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 11px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
  .overview .full-en {
    display: block; width: 100%; min-height: 48px;
    padding: 12px 16px; padding-right: 50px;
    border: 1px solid var(--card-border); border-radius: 14px;
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei","Iowan Old Style", serif;
    font-size: 15px; line-height: 1.6; color: var(--ink);
    background: #fff; outline: none;
    box-shadow: 0 2px 10px rgba(30,40,80,.05), 0 0 8px rgba(255,165,80,.25);
    animation: full-en-breathe 4s ease-in-out infinite;
    transition: box-shadow .3s ease, border-color .2s ease;
  }
  .overview .full-en:hover { border-color: rgba(0,0,0,0.32); }
  .overview .full-en:focus {
    border-color: var(--accent);
    box-shadow: 0 2px 10px rgba(30,40,80,.05), 0 0 18px rgba(255,165,80,.55);
    animation: none;
  }
  @keyframes full-en-breathe {
    0%, 100% { box-shadow: 0 2px 10px rgba(30,40,80,.05), 0 0 6px rgba(255,165,80,.2); }
    50%      { box-shadow: 0 2px 10px rgba(30,40,80,.05), 0 0 14px rgba(255,165,80,.4); }
  }
  .overview .divider { height: 1px; background: var(--line); margin: 22px 0; }
  .section-head { font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 11px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin: 34px 0 14px; }

  .chunk { position: relative; background: var(--card); border: 1px solid var(--card-border); border-radius: 18px; padding: 14px 22px 14px; margin-bottom: 14px; box-shadow: 0 4px 18px rgba(255,165,80,0.08); }
  .chunk-dot { position: absolute; top: 14px; left: 14px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: .25; }
  .chunk-num-dot {
    position: absolute; left: -26px; top: 14px;
    width: 20px; height: 20px; border-radius: 50%;
    background: #d1d1d6; color: #fff;
    font-size: 11px; font-weight: 600;
    font-family: "Gill Sans","Avenir Next",sans-serif;
    display: flex; align-items: center; justify-content: center;
    z-index: 1; flex-shrink: 0;
  }
  .chunk-num { font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 11px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 14px; }
  .chunk-head { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 6px; }
  .chunk-head .chunk-num { margin-bottom: 0; }
  .play-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--card-border); background: #fff; color: var(--accent); cursor: pointer; box-shadow: 0 2px 8px rgba(30,40,80,0.08); transition: transform .1s ease,background .15s ease,color .15s ease; -webkit-user-select: none; user-select: none; flex: none; }
  .play-btn:hover { background: #1d1d1f; color: #fff; transform: scale(1.06); }
  .play-btn:active { transform: scale(0.96); }
  .play-btn svg { width: 15px; height: 15px; display: block; }
  .play-btn.playing { background: var(--marked); color: #fff; border-color: var(--marked); }

  .line { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 4px 14px; }
  .tok { display: flex; flex-direction: column; align-items: center; text-align: center; }
  .word { font-size: 21px; font-weight: 500; letter-spacing: .01em; white-space: nowrap; color: var(--ink); cursor: pointer; border-radius: 4px; padding: 0 2px; transition: color .12s ease,background .12s ease; -webkit-user-select: none; user-select: none; }
  .word:hover { background: rgba(255,55,95,0.08); }
  .word.collo { font-weight: 800; }
  .word.marked { color: var(--marked); }
  .ipa { font-size: 14px; color: var(--ipa); margin-top: 5px; white-space: nowrap; font-family: "Gill Sans","Avenir Next",sans-serif; }
  .zh { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); font-size: 16px; color: var(--accent); font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; }

  @media (max-width: 480px) { .word{font-size:18px} .ipa{font-size:12.5px} .line{gap:4px 10px} }

  #tip { position: fixed; z-index: 50; max-width: 260px; background: #fff; color: var(--ink); border: 1px solid rgba(0,0,0,.08); border-radius: 16px; padding: 11px 13px; font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; font-size: 13.5px; line-height: 1.5; box-shadow: 0 14px 40px rgba(30,40,80,.22); pointer-events: none; opacity: 0; transform: translateY(4px); transition: opacity .12s ease,transform .12s ease; }
  #tip.show { opacity: 1; transform: translateY(0); }
  #tip .t-word { font-family: "Gill Sans","Avenir Next",sans-serif; font-weight: 700; font-size: 14px; margin-right: 6px; color: var(--ink); }
  #tip .t-phrase { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(0,0,0,.1); color: #a12f74; }
  #tip .t-phrase b { font-family: "Gill Sans","Avenir Next",sans-serif; color: var(--ink); }

  .chunks-loading { text-align: center; padding: 48px 0; color: var(--muted); }
  .chunks-loading p { margin-top: 14px; font-size: 14px; font-family: "Gill Sans","Avenir Next",sans-serif; letter-spacing: .06em; }
  .loading-dots { display: inline-flex; gap: 7px; }
  .loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: dot-bounce 1.4s infinite ease-in-out both; }
  .loading-dots span:nth-child(1) { animation-delay: -.32s; }
  .loading-dots span:nth-child(2) { animation-delay: -.16s; }
  @keyframes dot-bounce { 0%,80%,100% { transform: scale(.6); opacity: .4; } 40% { transform: scale(1); opacity: 1; } }

  @media print { .wrap{padding:24px;max-width:100%} .chunk{break-inside:avoid;box-shadow:none} }

  /* ===== 连接面板 ===== */
  .conn-panel { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; margin: 20px 0 24px; overflow: hidden; }
  .conn-toggle { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 14px 18px; border: none; background: transparent; cursor: pointer; font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: .12em; }
  .conn-toggle:hover { background: rgba(0,0,0,.02); }
  .conn-toggle .arrow { transition: transform .2s ease; }
  .conn-panel.open .conn-toggle .arrow { transform: rotate(180deg); }
  .conn-body { display: none; padding: 0 18px 18px; }
  .conn-panel.open .conn-body { display: block; }
  .conn-group { margin-bottom: 16px; }
  .conn-group:last-child { margin-bottom: 0; }
  .conn-group h3 { font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .conn-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
  .conn-row label { font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 12.5px; color: var(--accent); min-width: 70px; }
  .conn-row input { flex: 1; padding: 7px 10px; border: 1px solid var(--line); border-radius: 7px; font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 13px; color: var(--ink); background: #fafbfc; outline: none; }
  .conn-row input:focus { border-color: var(--accent); background: #fff; }
  .conn-actions { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: 8px; border: 1px solid var(--ink); background: var(--ink); color: #fff; font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 13px; cursor: pointer; transition: opacity .15s ease; }
  .btn:hover { opacity: .85; }
  .btn.secondary { background: transparent; color: var(--accent); border-color: var(--line); }
  .btn.secondary:hover { background: rgba(0,0,0,.04); opacity: 1; }
  .btn-action {
    background: #007aff; color: #fff; border: 1px solid #007aff;
  }
  .btn-action:hover { background: #0066d6; border-color: #0066d6; opacity: 1; }
  .btn-action:active { background: #0055b3; border-color: #0055b3; }
  .status { display: inline-flex; align-items: center; gap: 6px; font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 12.5px; }
  .status .dot { width: 8px; height: 8px; border-radius: 50%; background: #bbb; }
  .status.ok .dot { background: var(--ok); }
  .status.ok { color: var(--ok); }
  .status.err .dot { background: var(--err); }
  .status.err { color: var(--err); }

  /* ===== 输入区 ===== */
  .input-section { margin: 0 0 28px; }
  .input-section textarea { width: 100%; min-height: 48px; padding: 12px 16px; padding-right: 42px; border: 1px solid var(--card-border); border-radius: 14px; font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei","Iowan Old Style", serif; font-size: 15px; line-height: 1.6; color: var(--ink); resize: none; overflow: hidden; outline: none; background: #fff; box-shadow: 0 2px 10px rgba(30,40,80,.05); }
  .input-section textarea:focus { border-color: var(--accent); }

  /* 翻译加载超时提示 */
  .loading-hint {
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    font-size: 11px; color: #b0b0b8;
    margin-top: 6px; text-align: center;
    animation: hint-fade-in .3s ease;
  }
  @keyframes hint-fade-in { from { opacity: 0; } to { opacity: 1; } }
  .input-actions .loading-hint { margin-top: 0; }

  /* 输入框呼吸光晕 */
  .input-section textarea {
    box-shadow: 0 2px 10px rgba(30,40,80,.05), 0 0 8px rgba(41,182,246,.25);
    animation: input-breathe 4s ease-in-out infinite;
    transition: box-shadow .3s ease, border-color .2s ease;
  }
  .input-section textarea:hover { border-color: rgba(0,0,0,0.32); }
  .input-section textarea:focus {
    box-shadow: 0 2px 10px rgba(30,40,80,.05), 0 0 18px rgba(41,182,246,.55);
    animation: none;
  }
  @keyframes input-breathe {
    0%, 100% { box-shadow: 0 2px 10px rgba(30,40,80,.05), 0 0 6px rgba(41,182,246,.2); }
    50%      { box-shadow: 0 2px 10px rgba(30,40,80,.05), 0 0 14px rgba(41,182,246,.4); }
  }

  /* 输入框内播放按钮 */
  .input-section { position: relative; }
  .input-play-btn {
    position: absolute; top: 7px; right: 10px; z-index: 5;
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--card-border); background: #fff;
    color: var(--accent); cursor: pointer;
    box-shadow: 0 2px 8px rgba(30,40,80,0.08);
    display: flex; align-items: center; justify-content: center;
    transition: transform .1s ease, background .15s ease, color .15s ease;
  }
  .input-play-btn:hover { background: #1d1d1f; color: #fff; transform: scale(1.06); }
  .input-play-btn:active { transform: scale(0.96); }
  .input-play-btn svg { width: 15px; height: 15px; }
  .input-play-btn.playing { background: var(--marked); color: #fff; border-color: var(--marked); }
  .input-play-btn.loading { opacity: .55; cursor: wait; }
  .input-play-btn.loading svg { animation: spin .8s linear infinite; }

  /* overview/chunk 播放按钮：绝对定位在右上角，不独占一行 */
  .overview .play-full { position: absolute; top: 7px; right: 10px; z-index: 2; }
  .overview .full-en { padding-right: 42px; }
  .chunk .play-btn { position: absolute; top: 7px; right: 10px; z-index: 2; }
  .chunk .line { padding-right: 42px; }

  @media print { .settings-modal,.input-section,.btn-export-bottom,.footer-email,.right-fab-stack,.voice-fab,.voice-pop,.kokoro-pop,.icon-btn,.help-pop,.conn-status-bar{display:none!important} }

  /* Overview with full-text play button */
  .overview-head { display: flex; align-items: center; justify-content: space-between; }
  .overview-title { flex: 1; }
  .play-full { flex-shrink: 0; }

  /* Loading state for play-btn */
  .play-btn.loading { opacity: .55; cursor: wait; }
  .play-btn.loading svg { animation: spin .8s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }

  /* Style switcher */
  .style-bar { display: flex; gap: 6px; margin: 12px 0 14px; flex-wrap: wrap; }
  .style-btn {
    font-family: "Gill Sans","Avenir Next",sans-serif;
    font-size: 12.5px; font-weight: 500; letter-spacing: .04em;
    padding: 4px 14px; border-radius: 8px;
    border: 1px solid rgba(0,0,0,.08);
    background: #a5a5aa; color: #fff;
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease, border-width .1s ease, transform .15s ease, box-shadow .15s ease;
  }
  .style-btn:hover { background: #707075; transform: scale(1.06); }
  .style-btn.active { background: #707075; box-shadow: 0 2px 8px rgba(0,0,0,.95); }
  .style-pending-dot {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; align-self: center;
  }
  .style-pending-dot::after {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: #808085;
    animation: dot-breath 2s ease-in-out infinite;
  }
  @keyframes dot-breath {
    0%, 100% { opacity: .25; transform: scale(.6); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  /* 拆分按钮绿色 */
  .btn-green {
    background: #2a9d4a; color: #fff; border-color: #2a9d4a;
    transition: opacity .15s ease, transform .1s ease;
  }
  .btn-green:hover { background: #21883e; border-color: #21883e; opacity: 1; transform: scale(1.08); }
  .btn-green:active { transform: scale(0.94); }

  /* 浅色提示文字 */
  .hint {
    font-family: "Gill Sans","Avenir Next",sans-serif;
    font-size: 11.5px; color: #9a9aa0;
  }

  /* ===== 连接状态条 ===== */
  .conn-status-bar {
    display: flex; align-items: center; gap: 0;
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 10px; padding: 8px 16px; margin: 0 0 20px;
    box-shadow: 0 2px 8px rgba(30,40,80,.04);
    cursor: pointer; transition: box-shadow .15s ease, border-color .15s ease;
  }
  .conn-status-bar:hover { box-shadow: 0 4px 14px rgba(30,40,80,.08); border-color: rgba(0,0,0,.14); }
  .conn-status-item {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 12.5px;
  }
  .conn-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #c4c4c8; flex-shrink: 0;
    transition: background .2s ease, box-shadow .2s ease;
  }
  .conn-dot.ok { background: #2a9d4a; box-shadow: 0 0 6px rgba(42,157,74,.4); }
  .conn-dot.err { background: #d93025; }
  .conn-label { color: var(--muted); font-weight: 600; letter-spacing: .04em; }
  .conn-state { color: var(--ink); }
  .conn-state.pending { color: var(--muted); }
  .conn-sep { width: 1px; height: 14px; background: var(--line); margin: 0 14px; }

  /* ===== 引导设置提示 ===== */
  .guide-mask {
    position: fixed; inset: 0; background: rgba(20,20,30,.35);
    z-index: 300; display: flex; align-items: center; justify-content: center;
    animation: gmFade .2s ease;
  }
  @keyframes gmFade { from { opacity: 0; } to { opacity: 1; } }
  .guide-card {
    background: #fff; border-radius: 16px; padding: 28px 28px 22px;
    width: min(380px, 92vw); text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.18);
    animation: gcSlide .25s ease;
  }
  @keyframes gcSlide { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .guide-icon {
    width: 48px; height: 48px; border-radius: 50%;
    background: #f0f4ff; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .guide-icon svg { width: 24px; height: 24px; color: #007aff; }
  .guide-card h3 {
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--ink);
  }
  .guide-card p {
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px;
  }
  .guide-actions { display: flex; gap: 8px; justify-content: center; }
  .guide-actions .btn { font-size: 13px; padding: 8px 20px; }

  /* 拆分按钮工具栏 — 在卡片外部 */
  .full-text-toolbar {
    display: flex; align-items: center; gap: 10px;
    margin: 4px 0 14px;
  }

  /* 底部导出按钮 — 淡灰色 */
  .btn-export-bottom {
    display: block; margin: 48px auto 0; padding: 8px 28px;
    border: 1px solid var(--line); border-radius: 8px;
    background: transparent; color: #c0c0c6;
    font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 12.5px;
    letter-spacing: .04em; cursor: pointer;
    transition: color .15s ease, border-color .15s ease, background .15s ease;
  }
  .btn-export-bottom:hover { color: var(--accent); border-color: var(--accent); }
  .btn-export-bottom:active { color: var(--ink); border-color: var(--ink); background: rgba(0,0,0,.04); }
  .btn-export-bottom:disabled { color: var(--ink); border-color: rgba(0,0,0,.18); background: rgba(0,0,0,.04); cursor: wait; }
  .footer-email {
    text-align: center; margin-top: 10px; margin-bottom: 0;
    font-family: "Gill Sans","Avenir Next",sans-serif;
    font-size: 11px; color: #c8c8ce;
    letter-spacing: .02em;
  }
  .footer-attr {
    text-align: center; margin: 2px 0 16px;
    font-family: "Gill Sans","Avenir Next",sans-serif;
    font-size: 11px; color: #c8c8ce;
    letter-spacing: .01em;
  }
  .footer-attr a { color: #9aa0ff; text-decoration: none; }
  .footer-attr a:hover { text-decoration: underline; }

  /* 输入区按钮行 */
  .input-actions { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 4px; }
  .btn-shuffle {
    background: transparent; color: var(--accent); border: 1px solid var(--line);
  }
  .btn-shuffle:hover { background: rgba(0,0,0,.04); opacity: 1; }

  /* 设置弹窗 */
  .modal-mask.settings-modal { display: none; }
  .modal-mask.settings-modal.show { display: flex; }
  .settings-modal .modal { width: min(520px, 92vw); max-height: 85vh; overflow-y: auto; }
  .settings-modal .conn-group { margin-bottom: 20px; }
  .settings-modal .conn-group:last-child { margin-bottom: 0; }

  /* 帮助提示气泡 */
  .help-pop {
    position: absolute; top: 100%; right: 0; margin-top: 8px;
    width: 280px; background: #fff; border: 1px solid var(--card-border);
    border-radius: 12px; padding: 14px 16px; z-index: 200;
    box-shadow: 0 8px 30px rgba(30,40,80,.16);
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    font-size: 12.5px; color: var(--muted); line-height: 1.6;
    display: none;
  }
  .help-pop.show { display: block; }
  .help-pop strong { color: var(--ink); font-weight: 500; }

  /* 使用说明 */
  .usage {
    background: #fff; border: 1px solid rgba(0,0,0,0.07);
    border-radius: 12px; padding: 16px 18px;
    margin: 16px 0 20px; line-height: 1.65;
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    font-size: 13.5px; color: #6a6a70;
  }
  .usage h3 {
    font-family: "Gill Sans","Avenir Next",sans-serif;
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: #4d4d55; margin-bottom: 8px; font-weight: 600;
  }
  .usage ol { padding-left: 18px; }
  .usage li { margin-bottom: 5px; }
  .usage strong { color: #1d1d1f; font-weight: 500; }

  .conn-select {
    flex: 1; padding: 7px 10px; border: 1px solid var(--line); border-radius: 7px;
    font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 13px;
    color: var(--ink); background: #fafbfc; outline: none;
  }
  .voice-badge {
    font-family: "Gill Sans","Avenir Next",sans-serif;
    font-size: 11.5px; color: var(--muted); margin-top: 8px;
    padding: 5px 10px; background: #f4f4f5; border-radius: 6px;
    display: inline-block;
  }
  .voice-badge.active { color: #2a9d4a; background: #eaf6ed; }

  /* Export modal */
  .modal-mask {
    position: fixed; inset: 0; background: rgba(20,20,30,.38);
    z-index: 300; display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: #fff; border-radius: 18px; padding: 28px 28px 22px;
    width: min(440px, 92vw); box-shadow: 0 20px 60px rgba(0,0,0,.18);
  }
  .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
  .modal-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .modal-opt {
    display: block; padding: 13px 14px; border: 1px solid var(--line);
    border-radius: 12px; cursor: pointer; transition: border-color .15s, background .15s;
  }
  .modal-opt:hover { border-color: var(--ink); background: #fafbfc; }
  .modal-opt .opt-title { font-weight: 500; font-size: 14px; margin-bottom: 3px; }
  .modal-opt .opt-desc { font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; font-size: 12.5px; color: var(--muted); }
  .modal-section { margin-bottom: 16px; }
  .modal-section-title { font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }
  .style-checks { display: flex; flex-wrap: wrap; gap: 8px; }
  .style-check { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border: 1px solid var(--line); border-radius: 7px; cursor: pointer; font-size: 13px; font-family: "Gill Sans","Avenir Next",sans-serif; color: var(--accent); transition: border-color .15s, background .15s; }
  .style-check:hover { border-color: var(--ink); background: #fafbfc; }
  .style-check input { margin: 0; accent-color: var(--ipa); }
  .modal-note {
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    font-size: 12.5px; color: var(--muted); background: #f4f4f5;
    padding: 10px 12px; border-radius: 8px; margin-bottom: 18px; line-height: 1.5;
  }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

  /* 生词标注中文显示 */
  .word-cn {
    font-size: 12px; color: var(--marked); font-weight: 500;
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    white-space: nowrap; display: block; line-height: 1.4;
  }
  .tok { position: relative; padding-top: 0; }
  .tok:has(.word-cn) { padding-top: 16px; }

  /* TTS 服务商字段说明 */
  .field-hint {
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    font-size: 11px; color: #9a9aa0; padding: 4px 0 8px 78px;
  }

  /* 浏览器音色 */
  .voice-only-en-lbl {
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    font-size: 11px; color: #6a6a70; margin-left: 3px; user-select: none;
  }
  #voiceOnlyEn { accent-color: #1565c0; }
  #ttsVoiceSelect {
    flex: 1; padding: 7px 10px; border: 1px solid var(--line); border-radius: 7px;
    font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 13px;
    color: var(--ink); background: #fafbfc; outline: none; max-width: 100%;
  }
  #ttsVoiceSelect:focus { border-color: var(--accent); background: #fff; }

  /* 右侧悬浮按钮容器 */
  .right-fab-stack {
    position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
    z-index: 100; display: none; flex-direction: column; align-items: center; gap: 10px;
  }
  .right-fab-stack.show { display: flex; }

  /* 拆分悬浮按钮 — 圆形黑色 */
  .btn-split-fab {
    position: relative;
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(0,0,0,0.88);
    color: #fff;
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.95);
    transition: background .15s ease, transform .1s ease;
  }
  .btn-split-fab:hover { background: rgba(0,0,0,0.95); }
  .btn-split-fab:not(.loading):hover { animation: jelly-hover .5s ease; }
  .btn-split-fab:active { transform: scale(0.92); }
  .btn-split-fab:disabled { opacity: .5; cursor: wait; }
  .btn-split-fab.loading { animation: spin .8s linear infinite; }
  .btn-split-fab .split-fab-text { line-height: 1; }
  @keyframes jelly-hover {
    0%   { transform: scale(1); }
    25%  { transform: scale(1.2); }
    50%  { transform: scale(0.88); }
    75%  { transform: scale(1.07); }
    100% { transform: scale(1); }
  }
  /* 悬浮提示 */
  .btn-split-fab::after {
    content: 'LLM接通后，若修改可重拆段落';
    position: absolute;
    right: calc(100% + 8px);
    top: 50%; transform: translateY(-50%);
    white-space: nowrap;
    background: rgba(80,80,85,0.82); color: rgba(255,255,255,0.88);
    padding: 6px 10px; border-radius: 8px;
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    font-size: 12px; line-height: 1.4;
    opacity: 0; pointer-events: none;
    transition: opacity .15s ease .35s;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .btn-split-fab:hover::after { opacity: 1; }
  .btn-split-fab.loading::after { display: none; }
  body.llm-on .btn-split-fab::after { display: none; }

  /* Kokoro 音色悬浮按钮 — 横向 + 喇叭图标 */
  .kokoro-fab {
    padding: 6px 14px; border-radius: 22px;
    background: var(--ink); color: #fff; border: none; cursor: pointer;
    font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 12px;
    letter-spacing: .04em; box-shadow: 0 2px 8px rgba(0,0,0,.95);
    display: inline-flex; align-items: center; gap: 6px;
    transition: background .2s ease, transform .1s ease;
  }
  .kokoro-fab:hover { background: #2a2a2e; transform: scale(1.08); }
  .kokoro-fab:active { background: #1a1a1c; transform: scale(0.94); }
  .kokoro-fab svg { width: 14px; height: 14px; flex-shrink: 0; }
  .kokoro-fab .kokoro-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #2a9d4a; flex-shrink: 0;
  }

  /* 生词模式按钮 — 在音色按钮下方 */
  .vocab-toggle {
    position: static;
    padding: 6px 14px; border-radius: 22px;
    background: var(--ink); color: #fff; border: none; cursor: pointer;
    font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 12px;
    letter-spacing: .04em; box-shadow: 0 2px 8px rgba(0,0,0,.95);
    transition: background .2s ease, transform .1s ease;
    white-space: nowrap;
  }
  .vocab-toggle:hover { background: #2a2a2e; transform: scale(1.08); }
  .vocab-toggle:active { transform: scale(0.94); }
  .vocab-toggle.on { background: var(--marked); }

  /* Kokoro 弹出面板 — 绿色光晕 + 收窄 + 可拖动 */
  .kokoro-pop {
    position: fixed; z-index: 101;
    width: 155px; background: var(--card);
    border: 1px solid rgba(42,157,74,.25); border-radius: 14px;
    box-shadow: 0 8px 30px rgba(30,40,80,.16), 0 0 12px rgba(42,157,74,.28);
    display: none; overflow: hidden;
    animation: kpBreathe 4s ease-in-out infinite;
  }
  .kokoro-pop.show { display: block; }
  @keyframes kpBreathe {
    0%, 100% { box-shadow: 0 8px 30px rgba(30,40,80,.16), 0 0 8px rgba(42,157,74,.2); }
    50%      { box-shadow: 0 8px 30px rgba(30,40,80,.16), 0 0 16px rgba(42,157,74,.4); }
  }
  .kokoro-pop-hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-bottom: 1px solid var(--line);
    cursor: grab; user-select: none; -webkit-user-select: none;
  }
  .kokoro-pop-hdr:active { cursor: grabbing; }
  .kokoro-pop-title {
    font-family: "Gill Sans","Avenir Next",sans-serif;
    font-size: 11px; font-weight: 600; color: var(--accent);
    letter-spacing: .05em; display: flex; align-items: center; gap: 6px;
  }
  .kokoro-pop-title .kokoro-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #2a9d4a;
  }
  .kokoro-pop-close {
    width: 18px; height: 18px; border: none; background: transparent;
    color: var(--muted); cursor: pointer; font-size: 15px; line-height: 1;
    display: flex; align-items: center; justify-content: center; border-radius: 4px;
  }
  .kokoro-pop-close:hover { background: rgba(0,0,0,.06); color: var(--ink); }
  .kokoro-pop-body { padding: 10px 12px 12px; }
  .kokoro-field { margin-bottom: 10px; }
  .kokoro-field:last-child { margin-bottom: 0; }
  .kokoro-field label {
    font-family: "Gill Sans","Avenir Next",sans-serif;
    font-size: 11px; color: var(--muted); display: block; margin-bottom: 5px;
  }
  .kokoro-field select {
    width: 100%; padding: 6px 8px; border: 1px solid var(--line); border-radius: 7px;
    font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 12px;
    color: var(--ink); background: #fafbfc; outline: none; cursor: pointer;
  }
  .kokoro-field select:focus { border-color: var(--accent); background: #fff; }
  .kokoro-speed-wrap { display: flex; align-items: center; gap: 4px; }
  .kokoro-speed-arrow {
    width: 18px; height: 18px; border: 1px solid var(--line); border-radius: 4px;
    background: #fafbfc; color: var(--muted); cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; line-height: 1; padding: 0;
    transition: background .12s ease, color .12s ease;
  }
  .kokoro-speed-arrow:hover { background: var(--ink); color: #fff; border-color: var(--ink); }
  .kokoro-speed-arrow:active { transform: scale(0.9); }
  .kokoro-speed-wrap input[type=range] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px; background: var(--line); outline: none; min-width: 0;
  }
  .kokoro-speed-wrap input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 13px; height: 13px; border-radius: 50%;
    background: var(--ink); cursor: pointer; border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,.2);
  }
  .kokoro-speed-val {
    font-family: "Gill Sans","Avenir Next",sans-serif;
    font-size: 11px; color: var(--accent); min-width: 26px; text-align: right; flex-shrink: 0;
  }
  @media (max-width: 720px) { .right-fab-stack { display: none !important; } .kokoro-pop { display: none !important; } }

  /* 浏览器音色悬浮按钮 + 折叠面板 */
  .voice-fab {
    position: fixed; bottom: 24px; right: 24px; z-index: 100;
    padding: 10px 16px; border-radius: 24px;
    background: var(--ink); color: #fff; border: none; cursor: pointer;
    font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 12.5px;
    letter-spacing: .04em; box-shadow: 0 4px 14px rgba(0,0,0,.18);
    display: none; align-items: center; gap: 6px;
    transition: background .2s ease, transform .1s ease;
  }
  .voice-fab.show { display: inline-flex; }
  .voice-fab:hover { background: #2a2a2e; transform: scale(1.03); }
  .voice-fab:active { transform: scale(0.97); }
  .voice-fab svg { width: 15px; height: 15px; }

  .voice-pop {
    position: fixed; bottom: 66px; right: 24px; z-index: 101;
    width: 185px; background: var(--card);
    border: 1px solid var(--card-border); border-radius: 14px;
    box-shadow: 0 8px 30px rgba(30,40,80,.16);
    display: none; font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    overflow: hidden;
  }
  .voice-pop.show { display: block; animation: vpFade .15s ease; }
  @keyframes vpFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .voice-pop-hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-bottom: 1px solid var(--line);
  }
  .voice-pop-title { font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: .05em; }
  .voice-pop-close {
    width: 18px; height: 18px; border: none; background: transparent;
    color: var(--muted); cursor: pointer; font-size: 15px; line-height: 1;
    display: flex; align-items: center; justify-content: center; border-radius: 4px;
  }
  .voice-pop-close:hover { background: rgba(0,0,0,.06); color: var(--ink); }
  .voice-pop-body { padding: 8px 12px 10px; }
  .voice-pop-body select {
    width: 100%; padding: 5px 8px; border: 1px solid var(--line); border-radius: 6px;
    font-family: "Gill Sans","Avenir Next",sans-serif; font-size: 11.5px;
    color: var(--ink); background: #fafbfc; outline: none;
  }
  .voice-pop-body select:focus { border-color: var(--accent); background: #fff; }
  .voice-pop-foot { display: flex; align-items: center; margin-top: 6px; }
  .voice-pop-foot label { font-size: 10.5px; color: #6a6a70; margin-left: 4px; cursor: pointer; }
  .voice-pop-foot input { accent-color: #1565c0; }
  .voice-loading { font-size: 11px; color: var(--muted); margin: 0; }
  @media (max-width: 720px) { .voice-fab { display: none !important; } .voice-pop { display: none !important; } }


  /* 即将支持提示 */
  .planned-hint {
    font-family: "PingFang SC","Microsoft YaHei",sans-serif;
    font-size: 12px; color: #e8590c; background: #fff5f5;
    padding: 8px 12px; border-radius: 6px; margin: 6px 0;
    border-left: 3px solid #e8590c;
  }
  .usage-warning {
    margin-top: 12px; padding: 9px 12px; border-radius: 8px;
    background: #fff5f5; border-left: 3px solid #e8590c;
    font-family: "PingFang SC","Microsoft YaHei",sans-serif;
    font-size: 12px; color: #c92a2a; line-height: 1.55;
  }

  /* ===== 每次刷新引导 — 聚光灯模式 ===== */
  .onboard-mask {
    position: fixed; inset: 0;
    z-index: 350; cursor: pointer;
    animation: gmFade .25s ease;
    transition: opacity .7s cubic-bezier(.3,0,.2,1);
  }
  /* 圆形聚光灯 — 播放按钮 */
  .onboard-mask.spot-circle {
    background: radial-gradient(circle at var(--spot-x, 50%) var(--spot-y, 50%),
      transparent 0px,
      transparent calc(var(--spot-r, 44px) - 2px),
      rgba(0,0,0,0.08) var(--spot-r, 44px),
      rgba(0,0,0,0.52) calc(var(--spot-r, 44px) + 20px),
      rgba(0,0,0,0.6) 100vmax);
  }
  /* 矩形聚光灯 — 翻译按钮 */
  .onboard-mask.spot-rect {
    background: rgba(0,0,0,0.55);
    -webkit-mask:
      linear-gradient(to right, #fff 0, #fff calc(var(--rx1,0) - 6px), #000 calc(var(--rx1,0) + 6px), #000 calc(var(--rx2,100%) - 6px), #fff calc(var(--rx2,100%) + 6px), #fff 100%),
      linear-gradient(to bottom, #fff 0, #fff calc(var(--ry1,0) - 6px), #000 calc(var(--ry1,0) + 6px), #000 calc(var(--ry2,100%) - 6px), #fff calc(var(--ry2,100%) + 6px), #fff 100%);
    -webkit-mask-composite: source-in;
    mask:
      linear-gradient(to right, #fff 0, #fff calc(var(--rx1,0) - 6px), #000 calc(var(--rx1,0) + 6px), #000 calc(var(--rx2,100%) - 6px), #fff calc(var(--rx2,100%) + 6px), #fff 100%),
      linear-gradient(to bottom, #fff 0, #fff calc(var(--ry1,0) - 6px), #000 calc(var(--ry1,0) + 6px), #000 calc(var(--ry2,100%) - 6px), #fff calc(var(--ry2,100%) + 6px), #fff 100%);
    mask-composite: intersect;
  }
  .onboard-target {
    position: relative;
    z-index: 360 !important;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.25), 0 0 24px 4px rgba(255,255,255,0.07) !important;
  }
  .onboard-hint {
    position: fixed;
    z-index: 361;
    text-align: center;
    color: #fff;
    text-shadow: 0 1px 6px rgba(0,0,0,0.55);
    animation: ob-enter .4s cubic-bezier(.34,1.56,.64,1);
    transition: opacity .35s ease, transform .35s cubic-bezier(.4,0,.6,1);
  }
  .onboard-hint.ob-exit {
    opacity: 0;
    transform: scale(0.9) translateY(-8px);
  }
  @keyframes ob-enter {
    from { opacity: 0; transform: scale(0.88) translateY(6px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .onboard-hint .ob-text {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: .03em;
    white-space: nowrap;
  }
  /* 问号呼吸灯（橘黄色，闪2次，每次0.9秒） */
  .icon-btn.onboard-flash {
    animation: onboard-breath .9s ease-in-out 2;
  }
  @keyframes onboard-breath {
    0%, 100% {
      box-shadow: 0 0 0 0 rgba(255,165,0,0);
      background: transparent;
      border-color: var(--line);
      color: var(--accent);
    }
    50% {
      box-shadow: 0 0 20px 6px rgba(255,165,0,.7);
      background: rgba(255,165,0,.18);
      border-color: rgba(255,165,0,.6);
      color: #e67e00;
    }
  }

</style>

  <div id="tip"></div>

          </div>
          <button class="icon-btn" id="btnSettings" title="连接设置">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- ===== 连接状态条 ===== -->
    <div class="conn-status-bar" id="connStatusBar">
      <div class="conn-status-item" id="llmStatusItem">
        <span class="conn-dot" id="llmStatusDot"></span>
        <span class="conn-label">LLM</span>
        <span class="conn-state" id="llmStatusText">未连接</span>
      </div>
      <div class="conn-sep"></div>
      <div class="conn-status-item" id="ttsStatusItem">
        <span class="conn-dot ok" id="ttsStatusDot"></span>
        <span class="conn-label">TTS</span>
        <span class="conn-state" id="ttsStatusText">Kokoro 就绪</span>
      </div>
    </div>

    <!-- ===== 输入区（Hero） ===== -->
    <div class="input-section">
      <textarea id="inputText" rows="1" placeholder="输入中文场景，获得地道英语 + 逐词音标 + 真人发音"></textarea>
      <button class="play-btn input-play-btn" id="btnPlayInput" aria-label="播放输入框内容">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="input-actions">
        <button class="btn btn-green" id="btnGenerate">翻译</button>
      </div>
    </div>

    <div id="cardContent"></div>

    <!-- 底部导出按钮 -->
    <button class="btn-export-bottom" id="btnExport">导出离线卡片</button>
    <p class="footer-email">yjnrich@gmail.com</p>
    <p class="footer-attr">语音合成基于 <a href="https://github.com/hexgrad/kokoro" target="_blank" rel="noopener">Kokoro</a>（hexgrad，Apache-2.0）· 由 <a href="https://www.npmjs.com/package/kokoro-js" target="_blank" rel="noopener">kokoro-js</a> 提供 · 详见 <a href="THIRD-PARTY-NOTICES.md" target="_blank" rel="noopener">第三方许可声明</a></p>
  </div>

  <!-- ===== 设置弹窗 ===== -->
  <div class="modal-mask settings-modal" id="settingsModal">
    <div class="modal">
      <h2>连接设置</h2>
      <!-- LLM -->
      <div class="conn-group">
        <h3>LLM（翻译）</h3>
        <div class="conn-row"><label>API Key</label><input type="password" id="llmKey" placeholder="sk-..."></div>
        <div class="conn-row"><label>Base URL</label><input type="text" id="llmUrl" value="https://apihub.agnes-ai.com/v1"></div>
        <div class="conn-row"><label>Model</label><input type="text" id="llmModel" value="agnes-2.0-flash"></div>
        <div class="conn-actions">
          <button class="btn secondary" id="btnTestLlm">连接</button>
          <span class="status" id="llmStatus"><span class="dot"></span><span class="status-text">未连接</span></span>
        </div>
      </div>
      <!-- TTS -->
      <div class="conn-group">
        <h3>TTS（朗读）</h3>
        <div class="conn-row">
          <label>服务商</label>
          <select id="ttsProvider" class="conn-select">
            <optgroup label="已支持">
              <option value="kokoro" selected>Kokoro（内置）</option>
              <option value="browser">浏览器（免费保底）</option>
              <option value="elevenlabs">ElevenLabs</option>
              <option value="openai">OpenAI 兼容</option>
            </optgroup>
            <optgroup label="即将支持">
              <option value="azure">Azure TTS</option>
              <option value="minimax">MiniMax（海螺）</option>
              <option value="aliyun">阿里云 CosyVoice</option>
              <option value="tencent">腾讯云 TTS</option>
              <option value="volcengine">火山引擎（豆包）</option>
              <option value="xunfei">科大讯飞</option>
            </optgroup>
          </select>
        </div>
        <div id="ttsFields"></div>
        <div class="conn-actions">
          <button class="btn secondary" id="btnTestTts">连接测试</button>
          <span class="status" id="ttsStatus"><span class="dot"></span><span class="status-text">Kokoro（默认）</span></span>
        </div>
        <div class="voice-badge active" id="voiceBadge">当前语音：Kokoro</div>
      </div>
      <div class="modal-actions">
        <button class="btn secondary" id="settingsClose">关闭</button>
      </div>
    </div>
  </div>

  <!-- 右侧悬浮按钮栈：拆分 + 音色 + 生词模式 -->
  <div class="right-fab-stack" id="rightFabStack">
    <button class="btn-split-fab" id="btnSplit" aria-label="手动拆分整段英文">
      <span class="split-fab-text">拆</span>
    </button>
    <button class="kokoro-fab" id="kokoroFab">
      <span class="kokoro-dot"></span>
      音色
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </button>
    <button class="vocab-toggle" id="vocabToggle">生词模式</button>
  </div>

  <!-- 浏览器音色悬浮按钮 + 折叠面板 -->
  <button class="voice-fab" id="voiceFab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 5L6 9H2v6h4l5 4V5z"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
    网页音色
  </button>
  <div class="voice-pop" id="voicePanel">
    <div class="voice-pop-hdr">
      <span class="voice-pop-title">网页音色</span>
      <button class="voice-pop-close" id="voiceClose">×</button>
    </div>
    <div class="voice-pop-body" id="voicePanelBody"></div>
  </div>

  <!-- Kokoro 音色弹出面板 -->
  <div class="kokoro-pop" id="kokoroPop">
    <div class="kokoro-pop-hdr">
      <span class="kokoro-pop-title"><span class="kokoro-dot"></span>Kokoro 音色</span>
      <button class="kokoro-pop-close" id="kokoroClose">×</button>
    </div>
    <div class="kokoro-pop-body">
      <div class="kokoro-field">
        <label>音色</label>
        <select id="kokoroVoice">
          <optgroup label="美式英语">
            <option value="af_nicole">Nicole (女)</option>
            <option value="af_heart">Heart (女)</option>
            <option value="am_michael">Michael (男)</option>
          </optgroup>
          <optgroup label="英式英语">
            <option value="bf_emma">Emma (女)</option>
            <option value="bm_george">George (男)</option>
          </optgroup>
        </select>
      </div>
      <div class="kokoro-field">
        <label>语速</label>
        <div class="kokoro-speed-wrap">
          <button class="kokoro-speed-arrow" id="kokoroSpeedDown" type="button">◀</button>
          <input type="range" id="kokoroSpeed" min="0.5" max="2" step="0.1" value="1">
          <button class="kokoro-speed-arrow" id="kokoroSpeedUp" type="button">▶</button>
          <span class="kokoro-speed-val" id="kokoroSpeedVal">1.0×</span>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="kokoro-browser.js"></script>
  <script src="llm-browser.js"></script>
  <script src="app.js"></script>
  <script>
    // PWA Service Worker 注册
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function(e) {
        console.log('SW registration failed:', e);
      });
    }
  </script>
</body>
</html>
